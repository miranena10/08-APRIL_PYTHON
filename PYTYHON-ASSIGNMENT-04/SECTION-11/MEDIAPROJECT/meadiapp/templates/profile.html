<!DOCTYPE html>
<html>

<head>
    <title>My Profile</title>
</head>

<body>

<h2>{{ profile.display_name }}</h2>

<p>{{ profile.bio }}</p>

<p>{{ profile.phone }}</p>

{% if profile.profile_pic %}
    <img src="{{ profile.profile_pic.url }}"
         width="200">
{% else %}
    <img src="/media/default.png"
         width="200">
{% endif %}

<br><br>

<a href="{% url 'edit_profile' %}">
Edit Profile
</a>

</body>
</html>
