<!DOCTYPE html>
<html>

<head>
    <title>Products</title>
</head>

<body>

<h2>Product List</h2>

<a href="{% url 'add_product' %}">
Add Product
</a>

<br><br>

<table border="1" cellpadding="10">

<tr>

<th>ID</th>

<th>Name</th>

<th>Price</th>

<th>Category</th>

<th>Action</th>

</tr>

{% for product in products %}

<tr>

<td>{{ product.id }}</td>

<td>{{ product.name }}</td>

<td>{{ product.price }}</td>

<td>{{ product.category }}</td>

<td>

<a href="{% url 'edit_product' product.id %}">
Edit
</a>

|

<a href="{% url 'delete_product' product.id %}">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

</body>
</html>
