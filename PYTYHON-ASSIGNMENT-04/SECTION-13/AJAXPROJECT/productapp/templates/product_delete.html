<!DOCTYPE html>
<html>
<head>
    <title>Delete Product</title>

    <style>

        body{
            font-family: Arial;
            background:#f2f2f2;
        }

        .container{

            width:450px;
            margin:100px auto;
            background:white;
            padding:20px;
            text-align:center;
            border-radius:8px;

        }

        h2{

            color:red;

        }

        .delete-btn{

            background:red;
            color:white;
            border:none;
            padding:10px 20px;
            cursor:pointer;

        }

        .cancel-btn{

            background:green;
            color:white;
            padding:10px 20px;
            text-decoration:none;

        }

    </style>

</head>

<body>

<div class="container">

<h2>Delete Product</h2>

<p>

Are you sure you want to delete

<strong>{{ product.name }}</strong> ?

</p>

<form method="POST">

    {% csrf_token %}

    <button type="submit" class="delete-btn">

        Yes, Delete

    </button>

    <a href="{% url 'product_list' %}" class="cancel-btn">

        Cancel

    </a>

</form>

</div>

</body>
</html>
