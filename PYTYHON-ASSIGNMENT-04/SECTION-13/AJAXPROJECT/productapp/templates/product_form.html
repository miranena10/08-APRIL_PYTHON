<!DOCTYPE html>
<html>
<head>
    <title>Product Form</title>

    <style>

        body{
            font-family:Arial;
            background:#f2f2f2;
        }

        .container{

            width:450px;
            margin:40px auto;
            background:white;
            padding:20px;
            border-radius:8px;

        }

        h2{

            text-align:center;
            color:#2874F0;

        }

        label{

            font-weight:bold;

        }

        input,
        select{

            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;

        }

        button{

            width:100%;
            padding:10px;
            background:#2874F0;
            color:white;
            border:none;
            cursor:pointer;

        }

        a{

            text-decoration:none;

        }

    </style>

</head>

<body>

<div class="container">

<h2>Add / Edit Product</h2>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">

        Save Product

    </button>

</form>

<br>

<a href="{% url 'product_list' %}">

← Back to Product List

</a>

</div>

</body>
</html>
