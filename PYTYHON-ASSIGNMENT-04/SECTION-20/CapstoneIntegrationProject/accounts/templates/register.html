{% extends 'base.html' %}

{% block title %}Register - Movie Booking App{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 3rem auto;">
    <div class="card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <i class="fa-solid fa-user-plus" style="font-size: 2.5rem; color: var(--accent-blue); margin-bottom: 1rem;"></i>
            <h2>Create Account</h2>
            <p style="color: var(--text-secondary); margin-top: 0.25rem;">Sign up to book movie tickets</p>
        </div>
        
        <form method="POST" action="{% url 'register' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="yourname@email.com" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Confirm your password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; height: 45px; margin-top: 1rem;">
                <i class="fa-solid fa-user-check"></i> Register Account
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-secondary);">
            Already have an account? <a href="{% url 'login' %}" style="color: var(--accent-blue); text-decoration: none; font-weight: 600;">Log In</a>
        </div>
    </div>
</div>
{% endblock %}
