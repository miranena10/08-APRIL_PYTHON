{% extends 'base.html' %}

{% block title %}Login - Movie Booking App{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 3rem auto;">
    <div class="card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <i class="fa-solid fa-ticket" style="font-size: 2.5rem; color: var(--accent-blue); margin-bottom: 1rem;"></i>
            <h2>Welcome Back</h2>
            <p style="color: var(--text-secondary); margin-top: 0.25rem;">Log in to generate secure OTP</p>
        </div>
        
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-user" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary);"></i>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Enter username" style="padding-left: 2.5rem;" required>
                </div>
            </div>
            
            <div class="form-group" style="margin-bottom: 1rem;">
                <label class="form-label" for="password">Password</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary);"></i>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" style="padding-left: 2.5rem;" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; height: 45px; margin-top: 1.5rem;">
                <i class="fa-solid fa-arrow-right-to-bracket"></i> Log In
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-secondary);">
            Don't have an account? <a href="{% url 'register' %}" style="color: var(--accent-blue); text-decoration: none; font-weight: 600;">Sign Up</a>
        </div>
    </div>
</div>
{% endblock %}
