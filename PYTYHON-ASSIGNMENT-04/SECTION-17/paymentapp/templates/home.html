<!DOCTYPE html>
<html>
<head>
    <title>Payment Gateway</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="text-center">

        <h1 class="text-primary">💳 Payment Gateway Integration</h1>

        <p class="text-muted">
            IPL Ticket | Stripe | PayPal
        </p>

    </div>

    <div class="row mt-5">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h3>🏏</h3>

                    <h4>IPL Ticket</h4>

                    <p>Book IPL Match Tickets</p>

                    <a href="{% url 'pay' %}" class="btn btn-primary w-100">
                        Book Now
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h3>🍔</h3>

                    <h4>Zomato Order</h4>

                    <p>Pay using Stripe</p>

                    <a href="{% url 'food' %}" class="btn btn-success w-100">
                        Order Food
                    </a>

                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body text-center">

                    <h3>💰</h3>

                    <h4>PayPal</h4>

                    <p>IPL Ticket Payment</p>

                    <a href="{% url 'paypal' %}" class="btn btn-warning w-100">
                        Pay Now
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
